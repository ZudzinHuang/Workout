<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Calisthenics Program</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Calisthenics Program&quot;,&quot;short_name&quot;:&quot;Workout&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#080808&quot;,&quot;theme_color&quot;:&quot;#080808&quot;,&quot;start_url&quot;:&quot;.&quot;}">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080808;color:#e0e0e0;font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#2a2a2a}
button{font-family:'Courier New',monospace;cursor:pointer;border:none;background:none}
a{text-decoration:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.spinning{animation:spin 0.8s linear infinite;display:inline-block}
.tab-bar{position:sticky;top:0;z-index:50;background:#080808;border-bottom:1px solid #161616;padding:14px 16px 0}
.tab-row{display:flex;gap:0;margin-top:10px}
.tab-btn{padding:8px 13px;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:inherit;background:none;border:none;border-bottom:2px solid transparent;color:#3a3a3a;cursor:pointer;margin-bottom:-1px;transition:all 0.2s}
.tab-btn.active{border-bottom-color:var(--pc);color:var(--pc)}
.scroll-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll-row::-webkit-scrollbar{display:none}
.phase-btn{flex-shrink:0;padding:6px 11px;cursor:pointer;transition:all 0.2s;background:transparent;border:1px solid #1e1e1e}
.phase-btn.active{border-color:var(--pc);background:var(--pbg)}
.day-btn{flex-shrink:0;padding:6px 10px;cursor:pointer;background:transparent;border:1px solid #1a1a1a}
.day-btn.active{background:#111;border-color:var(--pc)}
.ex-row{padding:13px 0;border-bottom:1px solid #0e0e0e;display:flex;flex-direction:column;gap:0}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.how-btn{flex-shrink:0;background:transparent;border:1px solid var(--pc33);color:var(--pcaa);font-size:9px;letter-spacing:1px;padding:5px 9px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.set-dots{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:9px}
.dot{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:inherit;border:1px solid #252525;color:#2e2e2e;background:transparent;transition:all 0.2s}
.dot.done{border-color:var(--pc);background:var(--pc2a);color:var(--pc)}
.set-done-btn{padding:5px 11px;font-size:9px;letter-spacing:1px;font-family:inherit;border:1px solid var(--pc33);background:var(--pc18);color:var(--pc);cursor:pointer}
.complete-badge{font-size:9px;letter-spacing:1px;color:var(--pc)}
.reset-btn{padding:3px 7px;font-size:9px;font-family:inherit;background:transparent;border:1px solid #222;color:#444;cursor:pointer}
.timer-wrap{background:#080808;border:1px solid #1e1e1e;padding:12px 14px;margin-top:8px;display:flex;gap:14px;align-items:center;transition:border-color 0.3s}
.timer-wrap.running{border-color:var(--pc55)}
.timer-controls{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.timer-btn{padding:5px 11px;font-size:9px;letter-spacing:2px;font-family:inherit;cursor:pointer}
.timer-start{background:var(--pc1a);border:1px solid var(--pc44);color:var(--pc)}
.timer-stop{background:#200808;border:1px solid #5a1515;color:#f87171}
.timer-adj{background:transparent;border:1px solid #1e1e1e;color:#444;padding:5px 8px;font-size:9px;font-family:inherit}
.timer-close{background:transparent;border:1px solid #1e1e1e;color:#444;padding:5px 9px;font-size:9px;font-family:inherit}
.modal-overlay{position:fixed;inset:0;background:#000000dd;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#0d0d0d;border:1px solid var(--pc44);max-width:360px;width:100%;padding:18px}
.modal-header{display:flex;justify-content:space-between;margin-bottom:12px}
.modal-close{background:none;border:none;color:#555;font-size:20px;cursor:pointer;padding:0;line-height:1}
.modal-img{width:100%;max-height:260px;object-fit:contain;background:#f8f8f8;display:block}
.modal-noimg{height:160px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#444;font-size:11px}
.yt-link{display:block;margin-top:12px;text-align:center;font-size:9px;letter-spacing:2px;color:var(--pcaa);padding-top:12px;border-top:1px solid #1e1e1e}
.section{max-width:580px;margin:0 auto;padding:16px 14px 80px}
.phase-blurb{padding:9px 13px;margin-bottom:12px}
.day-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;border-bottom:1px solid #141414;margin-bottom:12px}
.tag-badge{font-size:7px;letter-spacing:1px;padding:2px 7px}
.notes-box{margin-top:14px;padding:11px 13px;background:#0a0a0a;border:1px solid #141414}
.rest-guide{margin-top:10px;padding:11px 13px;background:#0a0a0a;border:1px solid #141414;display:grid;grid-template-columns:1fr 1fr;gap:5px}
.rest-cell{padding:6px 9px}
.milestone-row{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.milestone-dot{width:9px;height:9px;border-radius:50%;margin-top:15px;flex-shrink:0;z-index:1}
.milestone-card{flex:1;padding:10px 12px;background:#0c0c0c;border:1px solid #161616;font-size:11px;color:#bbb;line-height:1.6}
.ladder-step{font-size:9px;padding:3px 7px;white-space:nowrap;flex-shrink:0}
.ladder-row{display:flex;align-items:center;gap:3px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.ladder-row::-webkit-scrollbar{display:none}
.diet-card{padding:13px;margin-bottom:7px;background:#0c0c0c;border:1px solid #161616;display:flex;gap:12px;align-items:flex-start}

.today-hero{background:linear-gradient(135deg,var(--pbg) 0%,#080808 100%);border:1px solid var(--pc22);padding:18px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:var(--pc);opacity:0.04;pointer-events:none}
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.week-cell{padding:6px 2px;text-align:center;border:1px solid #141414;background:#0a0a0a;cursor:default}
.week-cell.today{border-color:var(--pc);background:var(--pc0d)}
.week-cell.workout-day{cursor:pointer}
.week-cell.rest-day{opacity:0.5}
.week-cell.past{opacity:0.35}
.week-cell.future{opacity:0.6}
.week-cell.before-program{opacity:0.2}
.week-cell.after-program{opacity:0.2}
.prog-badge{display:inline-block;padding:2px 8px;font-size:8px;letter-spacing:2px;margin-top:6px}
.today-goto{padding:8px 16px;font-size:9px;letter-spacing:2px;font-family:inherit;cursor:pointer;margin-top:12px;display:inline-block}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = { pi:0, di:0, tab:"today", modal:null, setsDone:{}, timers:{}, holdTimers:{} };
// ── TIMER ENGINE (requestAnimationFrame + timestamps, throttle-proof) ────────
// Each active timer stores: { secs, remaining, running, startedAt, startRemaining }
// When running: remaining = startRemaining - (Date.now() - startedAt) / 1000
// This means Chrome throttling the rAF loop never causes drift — we always read
// the real wall clock.

let rafId = null;
const activeTimers = {}; // key -> true (just tracks which keys are animating)

function getTimerObj(key) {
  if(key.startsWith('hold-')) return state.holdTimers[key.slice(5)];
  return state.timers[key];
}

function tickAll() {
  rafId = requestAnimationFrame(tickAll);
  let anyRunning = false;
  const allKeys = [
    ...Object.keys(state.timers).map(k => k),
    ...Object.keys(state.holdTimers).map(k => 'hold-' + k),
  ];
  for(const key of allKeys) {
    const t = getTimerObj(key);
    if(!t || !t.running) continue;
    anyRunning = true;
    const elapsed = (Date.now() - t.startedAt) / 1000;
    const newRemaining = Math.max(0, t.startRemaining - elapsed);
    const prevRemaining = t.remaining;
    t.remaining = newRemaining;
    if(newRemaining <= 0 && prevRemaining > 0) {
      t.remaining = 0;
      t.running = false;
      render(); // trigger GO!/DONE! state
      continue;
    }
    // Patch DOM every ~100ms for smooth SVG arc, only re-render on second boundaries
    const prevSec = Math.ceil(prevRemaining);
    const nowSec = Math.ceil(newRemaining);
    if(nowSec !== prevSec) {
      patchTimerDOM(key, t);
    }
  }
}

function startRaf() {
  if(!rafId) rafId = requestAnimationFrame(tickAll);
}

function patchTimerDOM(key, t) {
  const wrap = document.getElementById('timer-' + key);
  if(!wrap) { render(); return; }
  const color = pc();
  const isHold = key.startsWith('hold-');
  const pct = t.remaining / t.secs;
  const R = 28, circ = 2 * Math.PI * R;
  const offset = (circ * (1 - pct)).toFixed(2);
  const sec = Math.ceil(t.remaining);
  const doneColor = isHold ? '#facc15' : '#f87171';
  const arc = wrap.querySelector('circle:last-child');
  const numEl = wrap.querySelector('.timer-num');
  if(arc) {
    arc.setAttribute('stroke-dashoffset', offset);
    arc.setAttribute('stroke', t.running ? color : '#333');
  }
  if(numEl) numEl.textContent = sec + 's';
}

function getPhase(){ return PHASES[state.pi]; }
function getDay(){ return getPhase().days[state.di]; }
function pc(){ return getPhase().color; }

  document.documentElement.style.setProperty('--pc1a', hex4);
  document.documentElement.style.setProperty('--pc44', hex5);
  document.documentElement.style.setProperty('--pc55', hex6);
  document.documentElement.style.setProperty('--pc18', hex7);

// Extract hold duration in seconds from a reps string like "30–45 sec", "20 sec", "10–15 sec"
function parseHoldSecs(reps) {
  if(!reps) return 0;
  const m = reps.match(/(\d+)[–\-]?(\d+)?\s*sec/i);
  if(!m) return 0;
  const lo = parseInt(m[1]);
  const hi = m[2] ? parseInt(m[2]) : lo;
  return Math.round((lo + hi) / 2);
}

// Is this exercise a hold/timed exercise?
function isHoldExercise(ex) {
  return parseHoldSecs(ex.reps) > 0;
}

function buildExercise(ex, i){
  const phase = getPhase();
  const key = `${state.pi}-${state.di}-${i}`;
  const done = state.setsDone[key] || 0;
  const total = parseInt(ex.sets) || 0;
  const timer = state.timers[key];          // between-set / between-exercise rest timer
  const holdTimer = state.holdTimers[key];  // per-rep hold timer
  const hasSets = total > 0 && ex.rest > 0;
  const holdSecs = parseHoldSecs(ex.reps);
  const hasHold = holdSecs > 0 && total > 0;
  const hasSearch = SEARCH[ex.name] !== undefined;
  const isComplete = hasSets && done >= total;

  // Between-exercise rest: fires after last set, +15s longer than between-set rest
  const betweenExRest = ex.rest > 0 ? ex.rest + 15 : 0;

  let setsHTML = '';
  if(hasSets){
    const dots = Array.from({length:total},(_,j)=>`<div class="dot ${j<done?'done':''}">${j+1}</div>`).join('');
    const btn = done < total
      ? `<button class="set-done-btn" data-key="${key}" data-rest="${ex.rest}" data-total="${total}" data-betweenex="${betweenExRest}">SET ${done+1} ✓</button>`
      : `<div style="display:flex;align-items:center;gap:7px"><span class="complete-badge">✓ DONE</span><button class="reset-btn" data-reset="${key}">↺</button></div>`;
    setsHTML = `<div class="set-dots">${dots}${btn}</div>`;
  }

  // Hold timer button (shows per-rep countdown for timed holds)
  let holdHTML = '';
  if(hasHold){
    if(holdTimer && holdTimer.show){
      holdHTML = buildTimerHTML('hold-'+key, holdTimer, phase.color, 'HOLD TIMER', true);
    } else {
      holdHTML = `<div style="margin-top:7px">
        <button class="hold-start-btn" data-holdkey="${key}" data-holdsecs="${holdSecs}"
          style="padding:5px 12px;font-size:9px;letter-spacing:2px;font-family:inherit;
          background:${phase.color}10;border:1px solid ${phase.color}33;color:${phase.color}88;cursor:pointer">
          ⏱ HOLD ${holdSecs}s
        </button>
      </div>`;
    }
  }

  // Between-set rest timer (shows while mid-exercise, between sets)
  let restHTML = '';
  if(timer && timer.show && done < total){
    restHTML = buildTimerHTML(key, timer, phase.color, 'REST BETWEEN SETS', true);
  }

  // Between-exercise rest timer (shows after last set of this exercise)
  let betweenExHTML = '';
  const bxTimer = state.timers['bx-'+key];
  if(bxTimer && bxTimer.show){
    betweenExHTML = buildTimerHTML('bx-'+key, bxTimer, phase.color, 'REST BEFORE NEXT EXERCISE', true);
  }

  return `<div class="ex-row" id="ex-${key}">
    <div class="ex-top">
      <div style="flex:1">
        <div style="font-size:13px;color:${ex.name==='Warm-up'?'#555':'#ddd'};margin-bottom:4px;line-height:1.4">${ex.name}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <span style="font-size:10px;color:#444">${ex.sets} sets</span>
          <span style="font-size:10px;color:${phase.color}">× ${ex.reps}</span>
          ${ex.rest>0?`<span style="font-size:9px;color:#333">rest ${ex.rest}s</span>`:''}
        </div>
      </div>
      ${hasSearch ? `<button class="how-btn" data-exname="${encodeURIComponent(ex.name)}" data-exkey="${key}">
        <span id="how-spin-${key}">▶</span> HOW
      </button>` : ''}
    </div>
    ${holdHTML}
    ${setsHTML}
    ${restHTML}
    ${betweenExHTML}
  </div>`;
}

function buildTimerHTML(key, timer, color, label, showClose){
  const pct = timer.remaining / timer.secs;
  const R = 28, circ = 2 * Math.PI * R;
  const offset = circ * (1-pct);
  const isDone = timer.remaining === 0;
  const isHold = label.includes('HOLD');
  const doneColor = isHold ? '#facc15' : '#f87171'; // yellow=hold done, red=rest done
  const doneText = isHold ? 'DONE!' : 'GO!';
  return `<div class="timer-wrap ${timer.running?'running':''}" id="timer-${key}">
    <div style="position:relative;width:64px;height:64px;flex-shrink:0">
      <svg width="64" height="64" style="transform:rotate(-90deg)">
        <circle cx="32" cy="32" r="${R}" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
        <circle cx="32" cy="32" r="${R}" fill="none" stroke="${isDone?doneColor:timer.running?color:'#333'}"
          stroke-width="3.5" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
          stroke-linecap="round" style="transition:stroke-dashoffset 1s linear,stroke 0.3s"/>
      </svg>
      <div class="timer-num" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${isDone?10:14}px;font-weight:900;color:${isDone?doneColor:timer.running?color:'#555'};font-family:inherit">
        ${isDone?doneText:Math.ceil(timer.remaining)+'s'}
      </div>
    </div>
    <div style="flex:1">
      <div style="font-size:8px;letter-spacing:2px;color:#3a3a3a;margin-bottom:7px">${label}</div>
      <div class="timer-controls">
        ${!isDone?`<button class="timer-btn ${timer.running?'timer-stop':'timer-start'}" data-taction="${timer.running?'pause':'start'}" data-tkey="${key}">
          ${timer.running?'PAUSE':timer.remaining<timer.secs?'RESUME':'START'}
        </button>`:''}
        ${(isDone || (!timer.running && timer.remaining < timer.secs))?`<button class="timer-btn timer-adj" data-taction="reset" data-tkey="${key}">↺</button>`:''}
        <button class="timer-btn timer-adj" data-taction="sub" data-tkey="${key}">−15s</button>
        <button class="timer-btn timer-adj" data-taction="add" data-tkey="${key}">+15s</button>
        ${showClose?`<button class="timer-btn timer-close" data-taction="close" data-tkey="${key}">✕</button>`:''}
      </div>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{
    state.tab = el.dataset.tab; render();
  }));
  document.querySelectorAll('[data-pi]').forEach(el=>el.addEventListener('click',()=>{
    state.pi = +el.dataset.pi; state.di = 0; state.holdTimers = {}; render();
  }));
  document.querySelectorAll('[data-di]').forEach(el=>el.addEventListener('click',()=>{
    state.di = +el.dataset.di; state.holdTimers = {}; render();
  }));

  // Set done
  document.querySelectorAll('[data-key]').forEach(el=>el.addEventListener('click',()=>{
    const key = el.dataset.key;
    const rest = +el.dataset.rest;
    const total = +el.dataset.total;
    const betweenEx = +el.dataset.betweenex || (rest + 15);
    state.setsDone[key] = (state.setsDone[key]||0)+1;
    const nowDone = state.setsDone[key];
    if(nowDone < total && rest > 0){
      // Between-set rest
      state.timers[key] = {show:true, secs:rest, remaining:rest, running:false};
      startTimerAuto(key);
    } else if(nowDone >= total && betweenEx > 0){
      // Between-exercise rest (after last set)
      const bxKey = 'bx-'+key;
      state.timers[bxKey] = {show:true, secs:betweenEx, remaining:betweenEx, running:false};
      startTimerAuto(bxKey);
    }
    render();
  }));

  // Reset set
  document.querySelectorAll('[data-reset]').forEach(el=>el.addEventListener('click',()=>{
    const key = el.dataset.reset;
    delete state.setsDone[key];
    const bxK = 'bx-'+key;
    delete state.timers[key]; delete state.timers[bxK]; delete state.holdTimers[key];
    render();
  }));

  // Timer actions
  document.querySelectorAll('[data-taction]').forEach(el=>el.addEventListener('click',()=>{
    const key = el.dataset.tkey;
    const action = el.dataset.taction;
    const isHold = key.startsWith('hold-');
    const realKey = isHold ? key.slice(5) : key;
    const store = isHold ? state.holdTimers : state.timers;
    const t = store[realKey];
    if(!t) return;
    if(action==='start'||action==='resume'){ startTimer(key, isHold); }
    else if(action==='pause'){ pauseTimer(key, isHold); }
    else if(action==='reset'){ resetTimer(key, isHold); }
    else if(action==='sub'||action==='add'){
      const delta = action==='sub' ? -15 : 15;
      // Snapshot current remaining from wall clock before mutating
      if(t.running && t.startedAt){
        const elapsed = (Date.now() - t.startedAt) / 1000;
        t.remaining = Math.max(0, t.startRemaining - elapsed);
      }
      t.secs = Math.max(5, t.secs + delta);
      t.remaining = Math.max(0, Math.min(t.secs, t.remaining + delta));
      // Reset the rAF anchor so elapsed is measured from now
      if(t.running){ t.startedAt = Date.now(); t.startRemaining = t.remaining; }
      render();
    }
    else if(action==='close'){
      pauseTimer(key, isHold);
      if(isHold){ state.holdTimers[realKey] = {show:false,secs:t.secs,remaining:t.secs,running:false}; }
      else { t.show = false; }
      render();
    }
  }));

  // How btn
  document.querySelectorAll('[data-exname]').forEach(el=>el.addEventListener('click',async()=>{
    const name = decodeURIComponent(el.dataset.exname);
    const key = el.dataset.exkey;
    if(imgCache[name] !== undefined){
      state.modal = {name, imgUrl: imgCache[name], loading:false};
      render(); return;
    }
    state.modal = {name, imgUrl:null, loading:true};
    render();
    const term = SEARCH[name];
    let url = null;
    if(term){
      try{
        const r1 = await fetch(`https://wger.de/api/v2/exercise/search/?term=${encodeURIComponent(term)}&language=english&format=json`);
        const d1 = await r1.json();
        const id = d1.suggestions?.[0]?.data?.id;
        if(id){
          const r2 = await fetch(`https://wger.de/api/v2/exerciseimage/?exercise_base=${id}&format=json`);
          const d2 = await r2.json();
          if(d2.results?.length) url = d2.results[0].image;
        }
      }catch(e){}
    }
    imgCache[name] = url;
    if(state.modal && state.modal.name === name){
      state.modal = {name, imgUrl:url, loading:false};
      render();
    }
  }));


  // Today goto buttons
  document.querySelectorAll('[data-goto-phase]').forEach(el=>el.addEventListener('click',()=>{
    state.pi = +el.dataset.gotoPhase;
    state.di = +el.dataset.gotoDay;
    state.tab = 'workout';
    render();
    window.scrollTo(0,0);
  }));

  // Hold timer start
  document.querySelectorAll('[data-holdkey]').forEach(el=>el.addEventListener('click',()=>{
    const key = el.dataset.holdkey;
    const secs = +el.dataset.holdsecs;
    state.holdTimers[key] = {show:true, secs:secs, remaining:secs, running:false};
    startTimerAuto('hold-'+key, true);
    render();
  }));

  // Modal close
  const overlay = document.getElementById('modal-overlay');
  if(overlay) overlay.addEventListener('click', e => {
    if(e.target === overlay || e.target.id === 'modal-close-btn'){ state.modal = null; render(); }
  });
}

function getTimerStore(key){
  if(key.startsWith('hold-')) return state.holdTimers[key.slice(5)];
  return state.timers[key];
}
function startTimerAuto(key, isHold){
  const realKey = isHold ? key.replace('hold-','') : key;
  const store = isHold ? state.holdTimers : state.timers;
  const t = store[realKey];
  if(!t) return;
  t.running = true;
  t.startedAt = Date.now();
  t.startRemaining = t.remaining;
  startRaf();
}

function startTimer(key, isHold){
  const realKey = isHold ? key.slice(5) : key;
  const store = isHold ? state.holdTimers : state.timers;
  const t = store[realKey];
  if(!t) return;
  t.running = true;
  t.startedAt = Date.now();
  t.startRemaining = t.remaining;
  startRaf();
  render();
}

function pauseTimer(key, isHold){
  const realKey = isHold ? key.slice(5) : key;
  const store = isHold ? state.holdTimers : state.timers;
  const t = store[realKey];
  if(t) {
    // Snapshot remaining before stopping so resume is accurate
    if(t.running && t.startedAt) {
      const elapsed = (Date.now() - t.startedAt) / 1000;
      t.remaining = Math.max(0, t.startRemaining - elapsed);
    }
    t.running = false;
  }
  render();
}

function resetTimer(key, isHold){
  const realKey = isHold ? key.slice(5) : key;
  const store = isHold ? state.holdTimers : state.timers;
  const t = store[realKey];
  if(t){ t.remaining = t.secs; t.running = false; t.startedAt = null; }
  render();
}

// ── SCHEDULE ─────────────────────────────────────────────────────────────────
// Program: May 1 2025 → Sep 7 2025 (last day before Sep 8 school)
// Week schedule: Mon=D1, Tue=D2, Wed=D3, Thu=REST, Fri=D4, Sat=D5, Sun=REST
const PROGRAM_START = new Date(2026, 3, 18); // Apr 18 2026
const PROGRAM_END   = new Date(2026, 8, 7); // Sep 7 2026

// Day-of-week → workout slot (0=Sun,1=Mon,...,6=Sat)
// Mon(1)=D1, Tue(2)=D2, Wed(3)=D3, Thu(4)=REST, Fri(5)=D4(recovery), Sat(6)=D5, Sun(0)=REST
const DOW_MAP = {1:0, 2:1, 3:2, 5:3, 6:4}; // dow -> dayIndex (0-based)
// Phase boundaries by week number (week 1 = May 1 week)
// Phase 1: weeks 1-5, Phase 2: 6-10, Phase 3: 11-15, Phase 4: 16-20

function getDateInfo(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const start = new Date(PROGRAM_START); start.setHours(0,0,0,0);
  const end = new Date(PROGRAM_END); end.setHours(0,0,0,0);
  if(d < start || d > end) return null;
  const daysSince = Math.floor((d - start) / 86400000);
  const weekNum = Math.floor(daysSince / 7) + 1; // 1-indexed
  const phaseIdx = daysSince < 39 ? 0 : daysSince < 74 ? 1 : daysSince < 109 ? 2 : 3;
  const dow = d.getDay();
  const dayIdx = DOW_MAP[dow];
  if(dayIdx === undefined) return {phaseIdx, weekNum, isRest:true, dow};
  return {phaseIdx, weekNum, dayIdx, isRest:false, dow};
}

function getTodayInfo() {
  const today = new Date(); today.setHours(0,0,0,0);
  return getDateInfo(today);
}

function buildToday() {
  const today = new Date(); today.setHours(0,0,0,0);
  const info = getTodayInfo();
  const todayPhase = info && !info.isRest ? PHASES[info.phaseIdx] : null;
  const todayDay = todayPhase ? todayPhase.days[info.dayIdx] : null;
  const TAG = {STRENGTH:{bg:"#0a1a10",text:"#4ade80",border:"#134d23"},SKILL:{bg:"#0a0a20",text:"#818cf8",border:"#2d2b7a"},CONDITIONING:{bg:"#1a0d00",text:"#fb923c",border:"#7c2d12"},RECOVERY:{bg:"#0a1520",text:"#38bdf8",border:"#075985"}};

  // Days until program ends
  const end = new Date(PROGRAM_END);
  const daysLeft = Math.ceil((end - today) / 86400000);
  const daysTotal = Math.ceil((end - PROGRAM_START) / 86400000);
  const pctDone = Math.max(0, Math.min(100, Math.round(((daysTotal - daysLeft) / daysTotal) * 100)));

  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Build week strip (Mon-Sun of current week)
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - ((dow+6)%7));
  let weekCells = '';
  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const isToday = d.getTime()===today.getTime();
    const dInfo = getDateInfo(d);
    const beforeProg = d < PROGRAM_START;
    const afterProg = d > PROGRAM_END;
    let cls = 'week-cell';
    let label = '—'; let sublabel = '';
    if(beforeProg||afterProg){ cls+=' before-program'; }
    else if(!dInfo){ cls+=' before-program'; }
    else if(dInfo.isRest){ cls+=' rest-day'; label='REST'; }
    else {
      const ph = PHASES[dInfo.phaseIdx];
      const dy = ph.days[dInfo.dayIdx];
      cls += ' workout-day';
      label = dy.label;
      sublabel = dy.type.split(' ').slice(0,1).join('');
    }
    if(isToday) cls+=' today';
    const isPast = d < today;
    if(isPast && !isToday) cls+=' past';
    const isFuture = d > today;
    if(isFuture) cls+=' future';

    const dInfo2 = getDateInfo(d);
    const clickAttr = (dInfo2 && !dInfo2.isRest && !beforeProg && !afterProg)
      ? `data-goto-phase="${dInfo2.phaseIdx}" data-goto-day="${dInfo2.dayIdx}"` : '';

    weekCells += `<div class="${cls}" ${clickAttr}>
      <div style="font-size:7px;letter-spacing:1px;color:${isToday?'var(--pc)':'#3a3a3a'}">${dayNames[d.getDay()]}</div>
      <div style="font-size:11px;font-weight:900;color:${isToday?'var(--pc)':'#555'};margin:2px 0">${d.getDate()}</div>
      <div style="font-size:7px;color:${isToday?'var(--pc)':'#2e2e2e'};letter-spacing:0.5px">${label}</div>
    </div>`;
  }

  // Hero card
  let heroContent = '';
  const pc2 = info && info.phaseIdx !== undefined ? PHASES[info.phaseIdx].color : '#555';

  if(!info) {
    const isPre = today < PROGRAM_START;
    const daysTo = isPre ? Math.ceil((PROGRAM_START - today)/86400000) : 0;
    heroContent = `
      <div style="font-size:8px;letter-spacing:3px;color:#555;margin-bottom:8px">PROGRAM STATUS</div>
      <div style="font-size:22px;font-weight:900;color:#555;margin-bottom:6px">${isPre?'NOT STARTED YET':'PROGRAM COMPLETE'}</div>
      <div style="font-size:12px;color:#555;line-height:1.6">${isPre?`Starts in ${daysTo} day${daysTo!==1?'s':''}. First workout: Apr 18th.`:'You made it to September 8th. Time to be unrecognizable.'}</div>`;
  } else if(info.isRest) {
    heroContent = `
      <div style="font-size:8px;letter-spacing:3px;color:#38bdf8;margin-bottom:8px">TODAY · ${dayNames[today.getDay()]} ${today.getDate()} ${months[today.getMonth()].toUpperCase()}</div>
      <div style="font-size:22px;font-weight:900;color:#38bdf8;margin-bottom:6px">REST DAY 🛋️</div>
      <div style="font-size:12px;color:#666;line-height:1.6">Week ${info.weekNum} of 20. Recovery is where growth happens — don't skip it. Eat your protein, sleep 8 hours.</div>`;
  } else {
    const ph = PHASES[info.phaseIdx];
    const dy = ph.days[info.dayIdx];
    const tg = TAG[dy.tag]||TAG.STRENGTH;
    heroContent = `
      <div style="font-size:8px;letter-spacing:3px;color:${ph.color};margin-bottom:8px">TODAY · ${dayNames[today.getDay()]} ${today.getDate()} ${months[today.getMonth()].toUpperCase()}</div>
      <div style="font-size:9px;color:#444;letter-spacing:2px;margin-bottom:4px">WEEK ${info.weekNum} OF 20 · PHASE ${ph.id}: ${ph.name}</div>
      <div style="font-size:24px;font-weight:900;color:${ph.color};line-height:1;margin-bottom:6px">${dy.label}</div>
      <div style="font-size:15px;color:#ccc;margin-bottom:10px">${dy.type}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:8px;letter-spacing:1px;padding:3px 8px;background:${tg.bg};color:${tg.text};border:1px solid ${tg.border}">${dy.tag}</span>
        <span style="font-size:10px;color:#555">${dy.exercises.filter(e=>parseInt(e.sets)>0).length} exercises</span>
      </div>
      <button class="today-goto" data-goto-phase="${info.phaseIdx}" data-goto-day="${info.dayIdx}" style="background:${ph.color}18;border:1px solid ${ph.color}44;color:${ph.color}">
        GO TO TODAY'S WORKOUT →
      </button>`;
  }

  // Progress bar
  const progBar = info ? `
    <div style="margin-bottom:14px;padding:11px 13px;background:#0a0a0a;border:1px solid #141414">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:8px;letter-spacing:2px;color:#3a3a3a">PROGRAM PROGRESS</div>
        <div style="font-size:8px;color:${pc2}">${pctDone}%</div>
      </div>
      <div style="height:4px;background:#141414;border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pctDone}%;background:${pc2};border-radius:2px;transition:width 0.5s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px">
        <div style="font-size:8px;color:#2e2e2e">Apr 18</div>
        <div style="font-size:9px;color:#555">${daysLeft > 0 ? daysLeft+' days left' : 'Program ended'}</div>
        <div style="font-size:8px;color:#2e2e2e">Sep 7</div>
      </div>
    </div>` : '';

  // Upcoming workouts (next 5 workout days)
  let upcoming = '';
  let found = 0; let check = new Date(today); check.setDate(check.getDate()+1);
  let rows = '';
  while(found < 4 && check <= PROGRAM_END) {
    const ci = getDateInfo(check);
    if(ci && !ci.isRest) {
      const ph = PHASES[ci.phaseIdx];
      const dy = ph.days[ci.dayIdx];
      const diffDays = Math.ceil((check-today)/86400000);
      const label = diffDays===1?'Tomorrow':`${dayNames[check.getDay()]} ${check.getDate()} ${months[check.getMonth()]}`;
      rows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0e0e0e">
        <div>
          <div style="font-size:9px;color:#555;margin-bottom:2px">${label}</div>
          <div style="font-size:12px;color:#ccc">${dy.label} · ${dy.type}</div>
        </div>
        <div style="font-size:8px;color:${ph.color};letter-spacing:1px;text-align:right">
          P${ph.id}<br><span style="font-size:7px;color:#3a3a3a">${ph.name}</span>
        </div>
      </div>`;
      found++;
    }
    check.setDate(check.getDate()+1);
  }

  const upcomingSection = rows ? `
    <div style="padding:11px 13px;background:#0a0a0a;border:1px solid #141414;margin-bottom:14px">
      <div style="font-size:7px;letter-spacing:2px;color:#3a3a3a;margin-bottom:8px">COMING UP</div>
      ${rows}
    </div>` : '';

  // Weekly schedule legend
  const scheduleLegend = `
    <div style="padding:11px 13px;background:#0a0a0a;border:1px solid #141414">
      <div style="font-size:7px;letter-spacing:2px;color:#3a3a3a;margin-bottom:8px">WEEKLY SCHEDULE</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">
        ${[['MON','D1'],['TUE','D2'],['WED','D3'],['THU','REST'],['FRI','D4'],['SAT','D5'],['SUN','REST']].map(([d,w])=>`
          <div style="padding:5px 2px;background:${w==='REST'?'transparent':'#111'};border:1px solid ${w==='REST'?'#111':'#1e1e1e'}">
            <div style="font-size:7px;color:#3a3a3a;letter-spacing:0.5px">${d}</div>
            <div style="font-size:9px;color:${w==='REST'?'#2a2a2a':'var(--pc)'};margin-top:1px">${w}</div>
          </div>`).join('')}
      </div>
    </div>`;

  return `
    <div style="--pc22:${pc2}22;--pc0d:${pc2}0d">
      <div class="today-hero" style="--pbg:${info&&!info.isRest?PHASES[info.phaseIdx].bg:'#0a0a0a'};--pc:${pc2}">
        ${heroContent}
      </div>
      ${progBar}
      <div style="font-size:7px;letter-spacing:2px;color:#3a3a3a;margin-bottom:6px">THIS WEEK</div>
      <div class="week-strip">${weekCells}</div>
      ${upcomingSection}
      ${scheduleLegend}
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
startRaf();
render();
</script>
